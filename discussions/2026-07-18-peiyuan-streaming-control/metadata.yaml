title: "Streaming Video Generation with Force Control"
date: 2026-07-18
topic_slug: streaming-control
leader:
  name: "Peiyuan Zhu"
  short_name: peiyuan
status: before-meeting
summary: >-
  This discussion studies whether trajectory-like control can remain responsive
  and causally meaningful when video is generated chunk by chunk over a long horizon.
